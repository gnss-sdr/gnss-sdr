name: Run volk_gnsssdr in non-x86 archs

on:
  push:
    paths:
      - "src/algorithms/libs/volk_gnsssdr_module/volk_gnsssdr/**"
      - "CMakeLists.txt"
  pull_request:
    paths:
      - "src/algorithms/libs/volk_gnsssdr_module/volk_gnsssdr/**"
      - "CMakeLists.txt"
  workflow_dispatch:

jobs:
  gnss-sdr-non-x86:
    runs-on: ubuntu-latest
    name: ${{ matrix.distro }} ${{ matrix.arch }} ${{ matrix.compiler.name }}

    # Run steps on a matrix of archs.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            distro: ubuntu24.04
            compiler: { name: g++-14, cc: gcc-14, cxx: g++-14 }
          - arch: aarch64
            distro: ubuntu24.04
            compiler: { name: clang-18, cc: clang-18, cxx: clang++-18 }
          - arch: armv7
            distro: ubuntu24.04
            compiler: { name: g++-14, cc: gcc-14, cxx: g++-14 }
          - arch: riscv64
            distro: ubuntu24.04
            compiler: { name: g++-14, cc: gcc-14, cxx: g++-14 }
          - arch: riscv64
            distro: ubuntu24.04
            compiler: { name: clang-18, cc: clang-18, cxx: clang++-18 }

    steps:
      - uses: actions/checkout@v6
      - uses: uraimo/run-on-arch-action@v3.0.1
        name: Test in non-x86 container
        continue-on-error: ${{ contains(fromJson('["ppc64le", "s390x"]'), matrix.arch) }}
        id: test
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          githubToken: ${{ github.token }} # Not required, but speeds up builds
          setup: |
            mkdir -p "${PWD}/testing"
          dockerRunArgs: |
            --volume "${PWD}:/gnss-sdr"
          env: |
            CC: ${{ matrix.compiler.cc }}
            CXX: ${{ matrix.compiler.cxx }}
          shell: /bin/sh
          install: |
            apt update
            apt install -y ${{ matrix.compiler.name }} git cmake python3-mako liborc-0.4-dev
          run: |
            git config --global --add safe.directory /gnss-sdr
            cd /gnss-sdr
            cd testing
            mkdir install
            cmake -DCMAKE_INSTALL_PREFIX=/gnss-sdr/testing/install ../src/algorithms/libs/volk_gnsssdr_module/volk_gnsssdr
            make
            make install
            cd install/bin
            LD_LIBRARY_PATH=/gnss-sdr/testing/install/lib/ ./volk_gnsssdr_profile